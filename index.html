<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャデポ — チャージdeポイント</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f8f8f8;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #e8531e;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .tagline {
      font-size: 1rem;
      color: #666;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }
    .link-card {
      display: block;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      color: #1a1a1a;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .link-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .link-card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .link-card-desc {
      font-size: 0.82rem;
      color: #888;
    }
    footer {
      margin-top: 48px;
      font-size: 0.78rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">チャデポ</div>
  <div class="tagline">チャージdeポイント — 公式サイト</div>
  <div class="links">
    <a href="/privacy" class="link-card">
      <div class="link-card-title">プライバシーポリシー</div>
      <div class="link-card-desc">個人情報の取り扱いについて</div>
    </a>
    <a href="/terms" class="link-card">
      <div class="link-card-title">利用規約</div>
      <div class="link-card-desc">サービス利用条件について</div>
    </a>
  </div>
  <footer>
    &copy; 2026 Hotseller Co., Ltd. All rights reserved.
  </footer>
</body>
</html>
